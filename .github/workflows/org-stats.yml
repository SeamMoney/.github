name: org-stats

on:
  schedule:
    - cron: "37 6 * * *"
  push:
    branches: [main]
    paths: ["scripts/**"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: org-stats
  cancel-in-progress: false

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Render org cards
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/render_org.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/
          if git diff --cached --quiet; then
            echo "no changes"
            exit 0
          fi
          git commit -m "chore: render org cards"
          for i in 1 2 3 4 5; do
            git push && break
            git pull --rebase
          done
